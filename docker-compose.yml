services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glowbook-app
    ports:
      - "8080:80"
    environment:
      APP_NAME: GlowBook
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: glowbook
      DB_USERNAME: glowbook
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - app-storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: glowbook-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: glowbook
      MYSQL_USER: glowbook
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: glowbook-pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: glowbook
      PMA_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  app-storage:
